<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: bisque;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1a1a1a;
        }

        .app-title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: -0.3px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            max-width: 820px;
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.25rem;
        }

        .card h3 {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: #6b7280;
            margin-bottom: 1rem;
        }

        /* Search Form */
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-form label {
            font-size: 13px;
            color:rosybrown;
        }

        .search-form input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            background: #f9fafb;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-form input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
            background: #fff;
        }

        .search-form input::placeholder {
            color: #9ca3af;
        }

        .submit-btn {
            padding: 10px 16px;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .submit-btn:hover {
            background: #dbeafe;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* History */
        .history-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .hist-btn {
            padding: 6px 14px;
            background: #f3f4f6;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .hist-btn:hover {
            background: #e5e7eb;
            color: #1a1a1a;
            border-color: #d1d5db;
        }

        /* Weather Card */
        .weather-card {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        .weather-card.show {
            display: flex;
        }

        .city-name {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .weather-desc {
            font-size: 13px;
            color: #6b7280;
            text-transform: capitalize;
            margin-top: 2px;
        }

        .temp-big {
            font-size: 48px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1;
        }

        .temp-unit {
            font-size: 20px;
            color: #6b7280;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat {
            background: #f9fafb;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #f3f4f6;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .stat-unit {
            font-size: 12px;
            color: #6b7280;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 180px;
            gap: 8px;
            color: #9ca3af;
        }

        .empty-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .empty-state span {
            font-size: 13px;
        }

        /* Loading */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 180px;
            gap: 12px;
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading span {
            font-size: 13px;
            color: #6b7280;
        }

        /* Error */
        .error-msg {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            color: #dc2626;
            font-size: 13px;
        }

        .error-msg.show {
            display: block;
        }

        .left-col {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
    </style>
</head>
<body>

    <h1 class="app-title">Async Weather Tracker</h1>

    <div class="layout">
        <!-- Left Column -->
        <div class="left-col">
            <div class="card">
                <h3>Search city weather</h3>
                <div class="search-form">
                    <label for="city">City name</label>
                    <input
                        type="text"
                        id="city"
                        placeholder="e.g. London, Tokyo, Delhi"
                        autocomplete="off"
                    >
                    <button class="submit-btn" id="submit-btn" type="button">Get weather</button>
                </div>
            </div>

            <div class="card">
                <h3>Search history</h3>
                <div class="history-btns" id="history-btns"></div>
            </div>
        </div>

        <!-- Right Column -->
        <div class="card">
            <h3>Weather info</h3>

            <div id="error-msg" class="error-msg"></div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <span>Fetching weather…</span>
            </div>

            <div id="empty-state" class="empty-state">
                <div class="empty-icon">☁</div>
                <span>Search a city to see weather</span>
            </div>

            <div id="weather-card" class="weather-card">
                <div>
                    <div class="city-name" id="w-city"></div>
                    <div class="weather-desc" id="w-desc"></div>
                </div>
                <div>
                    <span class="temp-big" id="w-temp"></span>
                    <span class="temp-unit">°C</span>
                </div>
                <div class="stats-grid">
                    <div class="stat">
                        <div class="stat-label">Humidity</div>
                        <div>
                            <span class="stat-value" id="w-humidity"></span>
                            <span class="stat-unit"> %</span>
                        </div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Wind speed</div>
                        <div>
                            <span class="stat-value" id="w-wind"></span>
                            <span class="stat-unit"> m/s</span>
                        </div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Feels like</div>
                        <div>
                            <span class="stat-value" id="w-feels"></span>
                            <span class="stat-unit"> °C</span>
                        </div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Pressure</div>
                        <div>
                            <span class="stat-value" id="w-pressure"></span>
                            <span class="stat-unit"> hPa</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "1a761d3bb408836cd1af3641ce1604c9";

        const cityInput   = document.getElementById("city");
        const submitBtn   = document.getElementById("submit-btn");
        const loading     = document.getElementById("loading");
        const emptyState  = document.getElementById("empty-state");
        const weatherCard = document.getElementById("weather-card");
        const errorMsg    = document.getElementById("error-msg");
        const historyBtns = document.getElementById("history-btns");

        let searchHistory = ["Delhi", "Mumbai"];

        function setLoading(on) {
            loading.className = on ? "loading show" : "loading";
            emptyState.style.display = on ? "none" : "";
            if (on) {
                weatherCard.className = "weather-card";
                errorMsg.className = "error-msg";
            }
            submitBtn.disabled = on;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.className = "error-msg show";
            emptyState.style.display = "none";
            weatherCard.className = "weather-card";
        }

        function renderHistory() {
            const unique = [...new Set(searchHistory)].slice(-6);
            historyBtns.innerHTML = unique.map(
                c => `<button class="hist-btn" onclick="searchCity('${c}')">${c}</button>`
            ).join("");
        }

        async function searchCity(name) {
            cityInput.value = name;
            setLoading(true);
            try {
                const res = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(name)}&appid=${API_KEY}&units=metric`
                );
                const data = await res.json();

                if (data.cod !== 200) {
                    showError(data.message || "City not found.");
                    setLoading(false);
                    return;
                }

                document.getElementById("w-city").textContent     = data.name + ", " + data.sys.country;
                document.getElementById("w-desc").textContent     = data.weather[0].description;
                document.getElementById("w-temp").textContent     = Math.round(data.main.temp);
                document.getElementById("w-humidity").textContent = data.main.humidity;
                document.getElementById("w-wind").textContent     = data.wind.speed.toFixed(1);
                document.getElementById("w-feels").textContent    = Math.round(data.main.feels_like);
                document.getElementById("w-pressure").textContent = data.main.pressure;

                weatherCard.className = "weather-card show";
                emptyState.style.display = "none";

                if (!searchHistory.includes(data.name)) {
                    searchHistory.push(data.name);
                    renderHistory();
                }
            } catch (e) {
                showError("Network error. Please try again.");
            }
            setLoading(false);
        }

        submitBtn.addEventListener("click", () => {
            const val = cityInput.value.trim();
            if (val) searchCity(val);
        });

        cityInput.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                const val = cityInput.value.trim();
                if (val) searchCity(val);
            }
        });

        renderHistory();
    </script>
</body>
</html>
